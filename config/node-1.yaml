# ═══════════════════════════════════════════════════════════
# 🥭 Mango Shield v2.0 — Cấu hình Deploy (ĐẦY ĐỦ CHỨC NĂNG)
# ═══════════════════════════════════════════════════════════

# ── Server (Cấu hình máy chủ web) ──
server:
  listen: "0.0.0.0:443"        # Port lắng nghe HTTPS (mặc định 443)
  http_listen: "0.0.0.0:80"    # Port lắng nghe HTTP (mặc định 80, tự động chuyển hướng sang HTTPS)
  read_timeout: 10s            # Thời gian tối đa cho phép client gửi Request (Chống Slowloris)
  write_timeout: 30s           # Thời gian tối đa để phản hồi cho client
  idle_timeout: 120s           # Thời gian giữ kết nối Keep-Alive
  max_header_bytes: 65536      # Kích thước Header tối đa (Ngăn tràn bộ nhớ)

# ── TLS (Bảo mật SSL/HTTPS) ──
tls:
  enabled: true                                                                # Bật/tắt chế độ bảo vệ HTTPS
  cert_file: "/etc/letsencrypt/live/firewall.vutrungocrong.fun/fullchain.pem"  # Đường dẫn tới chứng chỉ (Public Key)
  key_file: "/etc/letsencrypt/live/firewall.vutrungocrong.fun/privkey.pem"     # Đường dẫn tới khóa bảo mật riêng tư (Private Key)

# ── Domains (Bảo vệ nhiều tên miền cùng lúc & Load Balancing) ──
domains:
  - name: "firewall.vutrungocrong.fun" # Tên miền cần bảo vệ
    upstreams:                         # Danh sách các server gốc (Backend) - Hệ thống tự chia tải Round-Robin
      - url: "http://127.0.0.1:8080"
        weight: 1
      - url: "http://127.0.0.1:8080" # Dummy origin 2
        weight: 1

# ── Proxy (Kết nối về Server Gốc) ──
proxy:
  connect_timeout: 10s         # Thời gian chờ tối đa khi kết nối với Backend
  response_timeout: 60s        # Thời gian chờ Backend phản hồi
  max_idle_conns: 100          # Số kết nối rảnh (Keep-Alive) giữ sẵn với Backend
  keep_alive: true             # Bật/tắt tái sử dụng socket về Backend (Tăng tốc độ)
  websocket: true              # Cho phép dòng dữ liệu WebSocket đi qua Proxy

# CÁC CHẾ ĐỘ (mode):
#   • "auto"       — TỰ ĐỘNG thích ứng thông minh (KHUYẾN NGHỊ). 
#                    Hệ thống tự nhận diện trình duyệt thật/ẩn danh để cho qua nhanh,
#                    chỉ bật JS Challenge hoặc CAPTCHA khi có dấu hiệu DDoS hoặc IP nghi vấn.
#   • "challenge"  — Ép tất cả phải giải thử thách Javascript (JS PoW).
#   • "captcha"    — Ép tất cả phải nhấn giữ CAPTCHA để vào web.
#   • "block"      — Chế độ bảo trì, chặn toàn bộ lượt truy cập mới.
#   • "monitor"    — Chỉ theo dõi và ghi log, không chặn (Dùng để test).
protection:
  mode: "auto"                 # Chế độ bảo vệ — nên dùng "auto" (Tự động thông minh)
  whitelist_ips:               # Danh sách các IP an toàn được ưu tiên (Bot của Google, Admin, IP nội bộ)
    - "127.0.0.1"
    - "171.234.8.251" # My local IP

  # Rate Limiting — Giới hạn số lượng truy cập (Request) mỗi giây cho mỗi IP
  rate_limit:
    enabled: true              # Bật/tắt giới hạn
    requests_per_second: 30    # Tối đa 30 request / giây
    burst: 50                  # Khoảng trễ dung sai (Burst limit)
    per_ip: true               # Tính riêng cho từng IP (Thay vì tính gộp toàn Server)
    adaptive: true             # Tự động điều chỉnh khi Load CPU cao

  # Connection Limit — Giới hạn kết nối đồng thời từ Client đến Web gốc
  connection_limit:
    max_per_ip: 30        # Tối đa 100 kết nối / 1 IP
    max_total: 20000           # Tối đa 20000 kết nối toàn bộ hệ thống

  # ── Thử thách (Challenge) ──
  # Khi hệ thống nghi ngờ là Bot hoặc bị DDoS, sẽ gửi lệnh xác minh:
  #   Stage 1: JS Proof-of-Work (Web Check) - Tự động quay vòng tròn, không cần bấm.
  #   Stage 2: CAPTCHA (Mango Verify) - Yêu cầu người dùng nhấn giữ nút để xác minh.
  challenge:
    pow_difficulty: 3          # Độ khó vòng lặp tính toán (1-6). 3 là nhẹ, 5 là nặng.
    pow_adaptive: true         # Tự tăng độ khó nếu bị DDoS mạnh
    cookie_ttl: 3h            # Thời gian phiên hợp lệ (Session sống trong 3 tiếng)
    cookie_secret: "546869734973415365637265744b657931323334353637383930414243444546" # Phải giống nhau trên mọi Server để chia sẻ Session (32 byte hex)

  # Ban — Xử phạt các IP lặp lại hành vi xấu
  ban:
    duration: 10m              # Thời gian cấm IP (10 phút)
    max_fails: 3               # Khóa luôn IP nếu Client giải sai PoW 3 lần
    use_iptables: true         # Bật chế độ cấm ngay ở tầng Firewall gốc (XDP/Iptables)

  # Emergency Mode — Chế độ khẩn cấp tự động kích hoạt
  emergency:
    rps_threshold: 600         # Kích hoạt nếu RPS toàn hệ thống vượt mức 600
    duration: 60s              # Giữ chế độ khẩn cấp trong 60 giây
    auto_enable: true          # Bật tính năng tự động chuyển trạng thái

# ═══════════════════════════════════════════════════════════
# FINGERPRINT — Nhận diện Botnet qua tín hiệu mã hóa
# ═══════════════════════════════════════════════════════════
fingerprint:
  ja3:
    enabled: true              # Chấm điểm dấu vân tay kết nối SSL (JA3 Client Hello)
  ja4:
    enabled: true              # Phiên bản nâng cấp JA4
  http2:
    enabled: true              # Phân tích HTTP/2 Frame (Chặn Bot HTTP/2 Rapid Reset)
  ua_consistency:
    enabled: true              # Độ nhất quán giữa TLS vân tay và User-Agent (Vd: Khai là Chrome nhưng lại mã hóa kiểu curl)

# ═══════════════════════════════════════════════════════════
# INTELLIGENCE — Tích hợp tình báo các nguồn (Threat feeds)
# ═══════════════════════════════════════════════════════════
intelligence:
  geoip:
    enabled: true                                  # Kiểm tra quốc gia của IP
    db_path: "/opt/mango-shield/data/GeoLite2-City.mmdb"
    blocked_countries: []                          # Dùng mã ("VN", "US", "CN", "RU")
    allowed_countries: []                          # Nếu thiết lập mục này, chỉ cho phép các nước này và chặn phần còn lại
  ip_reputation:
    enabled: true                                  # Bật tính năng điểm uy tín IP
    abuseipdb_key: ""                              # API Key của AbuseIPDB
    cache_ttl: 1h                                  # Thời gian lưu lại kết quả từ API
    block_score: 80                                # Cấm IP ngay nếu tỷ lệ Report xấu trên 80 điểm
  asn:
    enabled: true                                  # Bật bộ lọc theo Tổ chức mạng (Datacenter/ISP)
    block_datacenter: false                        # Bật để chặn toàn bộ Cloud (AWS, GCP, DigitalOcean)

# ═══════════════════════════════════════════════════════════
# DETECTION — AI và Phát hiện hành vi (Behavior)
# ═══════════════════════════════════════════════════════════
detection:
  baseline:
    enabled: true              # Ghi lại hành vi chuẩn của Server làm mức cơ sở
    learning_period: 24h       # Thời gian AI học (24 tiếng)
    sample_rate: 100           # Tỉ lệ mẫu (%)
  anomaly:
    enabled: true              # Phát hiện bất thường cục bộ
    sensitivity: 0.7           # Độ nhạy (0.0 -> 1.0)
    threshold_multiplier: 2.5
  bot_classifier:
    enabled: true              # Trí tuệ AI phát hiện Bot (Sử dụng RandomForest)
    threshold: 0.7             # Đạt độ tự tin trên 0.7 -> Lập tức chặn
  session_tracking:
    enabled: true              # Theo dõi hành vi Request lặp lại trên 1 Cookie (Chống Tool Clicker)
    ttl: 30m                   # Thời gian duy trì điểm lỗi
    max_sessions: 100000

# ═══════════════════════════════════════════════════════════
# WAF — Tường lửa ứng dụng web (Core Rule Set)
# ═══════════════════════════════════════════════════════════
waf:
  enabled: true                # Bật Web Application Firewall phân tích lớp 7 (Payload Body)
  owasp_rules: true            # Áp dụng bộ luật chuẩu OWASP (Bảo vệ SQLi, XSS, Path Traversal)
  paranoia_level: 2            # Ngưỡng bắt WAF (1-4). 1 là nhẹ nhất ít lỗi vặt, 4 là siêu khắt khe dễ tốn CPU.
  custom_rules_path: ""        # Nơi chứa các luật tùy chỉnh (Format Json)

# ═══════════════════════════════════════════════════════════
# Caching & CDN (Tối ưu hóa Băng thông và CPU)
# ═══════════════════════════════════════════════════════════
cdn:
  enabled: true            # Bật CDN đệm trên RAM
  memory_limit_mb: 256     # Giới hạn RAM cấp cho CDN (MegaBytes)
  static_extensions:       # Các đuôi tệp tin an toàn để đệm
    - ".css"
    - ".js"
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".gif"
    - ".svg"
    - ".woff"
    - ".woff2"
    - ".ttf"
    - ".ico"
  bypass_rules:            # Không bao giờ đệm các URL này (URL động)
    - "/api/*"
    - "/admin/*"
    - "/wp-admin/*"
  bypass_cookies:          # Bỏ qua Cache nếu người dùng có các Cookie đăng nhập này
    - "wordpress_logged_in"
    - "laravel_session"
  bypass_headers:          # Bỏ qua Cache nếu Browser gửi các Header đặc biệt này
    - "X-No-Cache"

# ═══════════════════════════════════════════════════════════
# LOGGING — Lưu lịch sử hoạt động
# ═══════════════════════════════════════════════════════════
logging:
  level: "info"                # Mức độ log: "debug", "info", "warn", "error"
  format: "json"               # Định dạng log: "json" hoặc "text"
  file: "/var/log/mango-shield.log" # Đường dẫn file log
  max_size: 100                # Dung lượng tối đa mỗi file (MB)
  max_backups: 5               # Giữ tối đa 5 file cũ dồn lại

# ═══════════════════════════════════════════════════════════
# METRICS — Theo dõi giám sát (Prometheus/Grafana)
# ═══════════════════════════════════════════════════════════
metrics:
  enabled: true                # Bật cổng xuất dữ liệu thống kê
  listen: "127.0.0.1:9100"     # Port dành cho Prometheus cào dữ liệu
  path: "/metrics"             # Đường dẫn xuất dữ liệu

# ═══════════════════════════════════════════════════════════
# DASHBOARD — Bảng điều khiển web
# ═══════════════════════════════════════════════════════════
dashboard:
  enabled: true                # Bật giao diện điều khiển
  listen: "0.0.0.0:9090"       # Port truy cập (VD: http://IP:9090)
  username: "admin"            # Tài khoản đăng nhập
  password: "admin123"         # Mật khẩu đăng nhập

# ═══════════════════════════════════════════════════════════
# ALERTS — Cảnh báo tự động về Telegram/Discord
# ═══════════════════════════════════════════════════════════
alerts:
  telegram:
    enabled: true              # Bật cảnh báo Telegram khi có DDoS
    token: "token" #token bot telegram
    chat_id: "id group telegram"      # ID người nhận hoặc Group
  discord:
    enabled: false             # Bật cảnh báo Discord
    webhook_url: ""            # Link Webhook của Discord
  webhook:
    enabled: false             # Bật gửi JSON cảnh báo sang Server tùy chỉnh
    secret: ""
    url: ""

# ================================================================
# 🕸️ CLUSTER P2P (Mango Mesh)
# ================================================================
# Dành cho hệ thống nhiều VPS (Multi-Node Cluster).
# Các Firewall tự liên lạc với nhau qua Gossip Protocol (UDP/TCP)
# để báo cáo IP xấu. Ví dụ: Node Hà Nội chặn IP A -> Tự báo cho
# Node Hồ Chí Minh chặn theo chỉ trong vài Mili-Giây.
cluster:
  enabled: true
  node_name: "mango-edge-hn"
  bind_port: 7946
  advertise_ip: "103.77.246.172"
  secret_key: "AES-32-MANGO-SHIELD-GOSSIP-KEY!!"
  join_peers: []
